<!DOCTYPE html>
<html lang="tg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find your perfect place to stay</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-gray-50 font-sans antialiased min-h-screen flex flex-col justify-center items-center p-4">

  <div class="w-full max-w-[1200px] bg-white rounded-[40px] p-6 md:p-12 shadow-sm relative">
    
    <header class="w-full flex items-center justify-between mb-12">
      <div class="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-600 mx-auto pl-24">
        <a href="#" class="hover:text-emerald-600 transition">Booking</a>
        <a href="#" class="hover:text-emerald-600 transition">Facilities</a>
        <a href="#" class="hover:text-emerald-600 transition">About Us</a>
        <a href="#" class="hover:text-emerald-600 transition">Location</a>
        <a href="#" class="hover:text-emerald-600 transition">Contact</a>
      </div>
      <button class="bg-[#22c55e] hover:bg-emerald-600 text-white px-7 py-2.5 rounded-full text-sm font-medium transition ml-auto md:ml-0">
        Login
      </button>
    </header>

    <div class="bg-[#f4f9f8] rounded-[40px] overflow-hidden flex flex-col md:flex-row relative min-h-[550px] mb-16">
      
      <div class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-center z-10">
        <h1 class="text-4xl md:text-6xl font-bold text-gray-900 tracking-tight leading-tight mb-6">
          Find your perfect<br>place to stay
        </h1>
        <p class="text-gray-500 text-sm md:text-base max-w-sm mb-10 leading-relaxed">
          Lorem Ipsum is simply dummy text of the printing and typesetting industry.
        </p>
        
        <div class="flex items-center space-x-3 cursor-pointer group w-max">
          <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md group-hover:scale-105 transition">
            <svg class="w-4 h-4 text-[#22c55e] fill-current ml-0.5" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>
          <span class="font-semibold text-gray-900 text-sm md:text-base">Watch video</span>
        </div>
      </div>

      <div class="w-full md:w-1/2 relative min-h-[300px] md:min-h-full">
        <img src="./src/images/image.png" alt="House" class="w-full h-full object-cover">
      </div>

    </div>

    <div class="absolute bottom-[-30px] md:bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[300px] md:max-w-[850px] px-4 md:px-0 z-20">
      <div class="bg-white rounded-3xl md:rounded-full p-4 md:p-2.5 shadow-xl border border-gray-100 flex flex-col md:flex-row items-center justify-between gap-4 md:gap-2">
        
        <div class="flex items-center space-x-3 pl-4 w-full md:w-auto">
          <div class="text-[#22c55e] text-lg">📍</div>
          <div>
            <div class="text-xs font-bold text-gray-800">Location</div>
            <div class="text-[11px] text-gray-400">United States</div>
          </div>
        </div>

        <div class="hidden md:block h-8 w-px bg-gray-200"></div>

        <div class="flex items-center space-x-3 pl-4 md:pl-0 w-full md:w-auto">
          <div class="text-[#22c55e] text-lg">📅</div>
          <div>
            <div class="text-xs font-bold text-gray-800">Chack in</div>
            <div class="text-[11px] text-gray-400">10 Jun 2021</div>
          </div>
        </div>

        <div class="hidden md:block h-8 w-px bg-gray-200"></div>

        <div class="flex items-center space-x-3 pl-4 md:pl-0 w-full md:w-auto">
          <div class="text-[#22c55e] text-lg">📅</div>
          <div>
            <div class="text-xs font-bold text-gray-800">Chack out</div>
            <div class="text-[11px] text-gray-400">15 Jun 2021</div>
          </div>
        </div>

        <div class="hidden md:block h-8 w-px bg-gray-200"></div>

        <div class="flex items-center space-x-3 pl-4 md:pl-0 w-full md:w-auto">
          <div class="text-[#22c55e] text-lg">👤</div>
          <div>
            <div class="text-xs font-bold text-gray-800">Rooms for</div>
            <div class="text-[11px] text-gray-400">1 room, 2 guests</div>
          </div>
        </div>

        <button class="w-full md:w-auto bg-[#22c55e] hover:bg-emerald-600 text-white px-8 py-4 md:py-3.5 rounded-2xl md:rounded-full font-medium flex items-center justify-center space-x-2 transition">
          <svg class="w-4 h-4 stroke-current stroke-2 fill-none" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <span class="text-sm font-semibold">Search...</span>
        </button>

      </div>

  </div>

  <div class="h-12 md:h-0"></div>
